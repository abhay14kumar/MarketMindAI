# MarketMind AI local PostgreSQL baseline.
# Values favor safe local operation and observability, not production tuning.

listen_addresses = '*'
port = 5432
max_connections = 100

shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 64MB
work_mem = 4MB

wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

logging_collector = off
log_destination = 'stderr'
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_lock_waits = on
deadlock_timeout = 1s

timezone = 'UTC'
log_timezone = 'UTC'

password_encryption = 'scram-sha-256'
ssl = off
