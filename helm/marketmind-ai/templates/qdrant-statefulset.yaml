apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "marketmind-ai.componentName" (dict "root" . "component" "qdrant") }}
  labels:
    {{- include "marketmind-ai.labels" . | nindent 4 }}
    {{- include "marketmind-ai.selectorLabels" (dict "root" . "component" "qdrant") | nindent 4 }}
spec:
  serviceName: {{ include "marketmind-ai.componentName" (dict "root" . "component" "qdrant") }}
  replicas: {{ .Values.qdrant.replicaCount }}
  selector:
    matchLabels:
      {{- include "marketmind-ai.selectorLabels" (dict "root" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "marketmind-ai.selectorLabels" (dict "root" . "component" "qdrant") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "marketmind-ai.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.service.grpcPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
      {{- if not .Values.qdrant.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "marketmind-ai.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.qdrant.persistence.accessModes | nindent 10 }}
        {{- with .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
  {{- end }}
