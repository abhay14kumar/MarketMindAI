{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "marketmind-ai.secretName" . }}
  labels:
    {{- include "marketmind-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Empty by default. Supply these at install time or use an existing Secret.
  postgres-username: {{ .Values.secrets.postgresUsername | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
{{- end }}
