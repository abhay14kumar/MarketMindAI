# Source: marketmind-ai/templates/postgres-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: marketmind-ai-postgres
  labels:
    helm.sh/chart: marketmind-ai-0.1.0
    app.kubernetes.io/part-of: marketmind-ai
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: marketmind-ai
    app.kubernetes.io/instance: marketmind-ai
    app.kubernetes.io/component: postgres
spec:
  serviceName: marketmind-ai-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marketmind-ai
      app.kubernetes.io/instance: marketmind-ai
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marketmind-ai
        app.kubernetes.io/instance: marketmind-ai
        app.kubernetes.io/component: postgres
    spec:
      
      containers:
        - name: postgres
          image: "postgres:17-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "marketmind"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: marketmind-ai-secrets
                  key: postgres-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketmind-ai-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          helm.sh/chart: marketmind-ai-0.1.0
          app.kubernetes.io/part-of: marketmind-ai
          app.kubernetes.io/managed-by: Helm
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

